<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>秦皇岛 · 实时天气</title>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #2b3b4c 0%, #1b2735 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 30px 0;
      color: #fff;
      transition: background 0.6s ease;
      position: relative;
      overflow-x: hidden;
    }

    /* 动态背景覆盖 (用于不同天气) */
    .bg-sunny { background: linear-gradient(135deg, #4e8dd0 0%, #2160a1 100%); }
    .bg-cloudy { background: linear-gradient(135deg, #6e7d8c 0%, #4a5568 100%); }
    .bg-rain { background: linear-gradient(135deg, #3a4658 0%, #1e2a36 100%); }
    .bg-snow { background: linear-gradient(135deg, #b0c4de 0%, #7a8b9f 100%); }
    .bg-fog { background: linear-gradient(135deg, #708090 0%, #4f5b66 100%); }
    .bg-default { background: linear-gradient(135deg, #2b3b4c 0%, #1b2735 100%); }

    #rainCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .main-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 600px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 10px;
    }

    /* 导航栏 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 30px;
      padding: 10px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .logo {
      font-weight: 600;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
    }
    .nav-links {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .nav-item {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #e2e8f0;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
      backdrop-filter: blur(5px);
    }
    .nav-item.active, .nav-item:hover {
      background: rgba(255,255,255,0.22);
      color: white;
    }

    /* 二级菜单 */
    .dropdown {
      position: relative;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 110%;
      background: rgba(20, 25, 40, 0.95);
      backdrop-filter: blur(25px);
      border-radius: 16px;
      min-width: 130px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
      z-index: 200;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .dropdown-content.show {
      display: block;
    }
    .dropdown-content a {
      color: #ccd6e0;
      padding: 12px 20px;
      display: block;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
      cursor: pointer;
    }
    .dropdown-content a:hover {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    /* 卡片 */
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 28px;
      padding: 24px 20px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }

    .location {
      font-size: 1.1rem;
      font-weight: 500;
      opacity: 0.9;
      text-align: center;
      margin-bottom: 5px;
    }
    .large-temp {
      font-size: 6rem;
      font-weight: 200;
      text-align: center;
      line-height: 1;
      margin: 5px 0;
      letter-spacing: -2px;
    }
    .condition {
      text-align: center;
      font-size: 1.2rem;
      text-transform: capitalize;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .hi-lo {
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    /* 详情条 */
    .detail-row {
      display: flex;
      justify-content: space-around;
      margin: 15px 0 5px;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 15px;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .detail-value {
      font-weight: 600;
      font-size: 1rem;
      margin-top: 4px;
    }

    /* 生活建议 */
    .advice-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 14px 18px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .advice-icon { font-size: 1.5rem; }

    /* 逐小时 */
    .hourly-scroll {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding-bottom: 8px;
      scrollbar-width: thin;
    }
    .hour-item {
      flex: 0 0 auto;
      min-width: 65px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 10px 8px;
      text-align: center;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .hour-time { font-size: 0.8rem; opacity: 0.8; }
    .hour-icon { font-size: 1.5rem; margin: 5px 0; }
    .hour-temp { font-weight: 600; }
    .hour-rain { font-size: 0.7rem; color: #a0c4ff; }

    /* 图表容器 */
    .chart-box {
      height: 220px;
      width: 100%;
      margin-top: 5px;
    }

    #map {
      height: 220px;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }

    @media (max-width: 480px) {
      .large-temp { font-size: 5rem; }
      .nav-item { padding: 6px 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body id="bodyBg">
  <canvas id="rainCanvas"></canvas>

  <div class="main-container">
    <!-- 导航栏 + 二级菜单 -->
    <nav class="navbar">
      <div class="logo">🌊 秦皇岛</div>
      <div class="nav-links">
        <button class="nav-item" id="navNow">实时</button>
        <button class="nav-item" id="navHourly">逐小时</button>
        <button class="nav-item" id="navDaily">7日</button>
        <button class="nav-item" id="navMapBtn">地图</button>
        <div class="dropdown">
          <button class="nav-item" id="dropdownBtn">更多 ▾</button>
          <div class="dropdown-content" id="dropdownContent">
            <a id="refreshBtn">🔄 刷新</a>
            <a id="aboutBtn">ℹ️ 关于</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- 当前天气卡片 -->
    <div class="card" id="currentCard">
      <div class="location">📍 秦皇岛市</div>
      <div class="large-temp" id="tempMain">--°</div>
      <div class="condition" id="weatherDesc">--</div>
      <div class="hi-lo" id="hiLo">最高 --° / 最低 --°</div>
      <div class="detail-row">
        <div class="detail-item">💧 湿度 <span class="detail-value" id="humVal">--%</span></div>
        <div class="detail-item">🌬️ 风速 <span class="detail-value" id="windVal">-- km/h</span></div>
        <div class="detail-item">🌡️ 体感 <span class="detail-value" id="feelVal">--°</span></div>
        <div class="detail-item">👁️ 能见度 <span class="detail-value" id="visVal">-- km</span></div>
      </div>
      <!-- 生活建议 -->
      <div class="advice-card" id="adviceBox">
        <span class="advice-icon">💡</span>
        <span id="adviceText">加载中…</span>
      </div>
    </div>

    <!-- 逐小时 -->
    <div class="card" id="hourlySection">
      <h3 style="font-weight:500; margin-bottom:12px;">⏳ 逐小时预报</h3>
      <div class="hourly-scroll" id="hourlyContainer"></div>
    </div>

    <!-- 7日图表 -->
    <div class="card" id="dailySection">
      <h3 style="font-weight:500; margin-bottom:8px;">📈 7日温度趋势</h3>
      <div class="chart-box"><canvas id="tempChart"></canvas></div>
    </div>

    <!-- 地图 -->
    <div class="card" id="mapSection">
      <h3 style="font-weight:500; margin-bottom:8px;">🗺️ 天气地图</h3>
      <div id="map"></div>
    </div>
  </div>

  <script>
    (function() {
      // 秦皇岛坐标
      const LAT = 39.9389, LON = 119.5983;

      // DOM 元素
      const bodyBg = document.getElementById('bodyBg');
      const tempMain = document.getElementById('tempMain');
      const weatherDesc = document.getElementById('weatherDesc');
      const hiLo = document.getElementById('hiLo');
      const humVal = document.getElementById('humVal');
      const windVal = document.getElementById('windVal');
      const feelVal = document.getElementById('feelVal');
      const visVal = document.getElementById('visVal');
      const hourlyContainer = document.getElementById('hourlyContainer');
      const adviceText = document.getElementById('adviceText');
      const rainCanvas = document.getElementById('rainCanvas');
      const ctx = rainCanvas.getContext('2d');

      let tempChart = null;
      let map = null;
      let mapMarker = null;

      // ---------- 完整 WMO 天气代码映射 ----------
      const weatherMap = {
        0: { desc: '晴天', emoji: '☀️', isRain: false, bg: 'bg-sunny' },
        1: { desc: '大部晴朗', emoji: '🌤️', isRain: false, bg: 'bg-sunny' },
        2: { desc: '局部多云', emoji: '⛅', isRain: false, bg: 'bg-cloudy' },
        3: { desc: '多云', emoji: '☁️', isRain: false, bg: 'bg-cloudy' },
        45: { desc: '雾', emoji: '🌫️', isRain: false, bg: 'bg-fog' },
        48: { desc: '霜冻雾', emoji: '🌫️', isRain: false, bg: 'bg-fog' },
        51: { desc: '小毛毛雨', emoji: '🌦️', isRain: true, bg: 'bg-rain' },
        53: { desc: '毛毛雨', emoji: '🌦️', isRain: true, bg: 'bg-rain' },
        55: { desc: '大毛毛雨', emoji: '🌧️', isRain: true, bg: 'bg-rain' },
        56: { desc: '冻毛毛雨', emoji: '🌨️', isRain: true, bg: 'bg-rain' },
        57: { desc: '冻毛毛雨', emoji: '🌨️', isRain: true, bg: 'bg-rain' },
        61: { desc: '小雨', emoji: '🌧️', isRain: true, bg: 'bg-rain' },
        63: { desc: '中雨', emoji: '🌧️', isRain: true, bg: 'bg-rain' },
        65: { desc: '大雨', emoji: '🌧️', isRain: true, bg: 'bg-rain' },
        66: { desc: '小冻雨', emoji: '🌨️', isRain: true, bg: 'bg-rain' },
        67: { desc: '冻雨', emoji: '🌨️', isRain: true, bg: 'bg-rain' },
        71: { desc: '小雪', emoji: '❄️', isRain: false, bg: 'bg-snow' },
        73: { desc: '中雪', emoji: '❄️', isRain: false, bg: 'bg-snow' },
        75: { desc: '大雪', emoji: '❄️', isRain: false, bg: 'bg-snow' },
        77: { desc: '雪粒', emoji: '❄️', isRain: false, bg: 'bg-snow' },
        80: { desc: '小阵雨', emoji: '🌦️', isRain: true, bg: 'bg-rain' },
        81: { desc: '阵雨', emoji: '🌧️', isRain: true, bg: 'bg-rain' },
        82: { desc: '大阵雨', emoji: '🌧️', isRain: true, bg: 'bg-rain' },
        85: { desc: '小阵雪', emoji: '❄️', isRain: false, bg: 'bg-snow' },
        86: { desc: '阵雪', emoji: '❄️', isRain: false, bg: 'bg-snow' },
        95: { desc: '雷暴', emoji: '⛈️', isRain: true, bg: 'bg-rain' },
        96: { desc: '雷暴伴冰雹', emoji: '⛈️', isRain: true, bg: 'bg-rain' },
        99: { desc: '强雷暴伴冰雹', emoji: '⛈️', isRain: true, bg: 'bg-rain' }
      };

      function getWeather(code) {
        return weatherMap[code] || { desc: '多云', emoji: '☁️', isRain: false, bg: 'bg-default' };
      }

      // ---------- 趣味生活建议 ----------
      const adviceDB = {
        sunny: [
          '阳光正好，适合去海边散步 🌊',
          '紫外线强，记得涂防晒哦 🧴',
          '今天适合晾晒衣物，晒晒被子吧',
          '天气晴好，心情也要明亮起来呀 ✨'
        ],
        cloudy: [
          '云朵像棉花糖，适合喝杯咖啡 ☕',
          '阴天不晒，适合户外运动 🏃',
          '天空虽然阴沉，但你的笑容可以点亮一切'
        ],
        rain: [
          '出门记得带伞，别淋成落汤鸡 🐔',
          '雨天最适合窝在家里看电影 🎬',
          '路面湿滑，开车慢行，安全第一',
          '雨后或许能遇见彩虹哦 🌈'
        ],
        snow: [
          '下雪啦！可以堆雪人啦 ⛄',
          '注意保暖，路面结冰小心行走',
          '雪天空气清新，深呼吸一下吧'
        ],
        fog: [
          '大雾天气，开车记得开雾灯 🚗',
          '朦胧也是一种美，但要注意安全'
        ],
        default: [
          '无论什么天气，都要保持好心情 ❤️',
          '今天也是元气满满的一天',
          '喝杯热水，对自己好一点'
        ]
      };

      function getAdvice(weatherCode) {
        const info = getWeather(weatherCode);
        const desc = info.desc;
        let pool = adviceDB.default;
        if (desc.includes('晴')) pool = adviceDB.sunny;
        else if (desc.includes('云')) pool = adviceDB.cloudy;
        else if (desc.includes('雨') || desc.includes('雷')) pool = adviceDB.rain;
        else if (desc.includes('雪')) pool = adviceDB.snow;
        else if (desc.includes('雾')) pool = adviceDB.fog;
        return pool[Math.floor(Math.random() * pool.length)];
      }

      // ---------- 雨滴/雪动画 ----------
      let rainActive = false;
      let drops = [];
      const MAX = 120;

      function resizeCanvas() {
        rainCanvas.width = window.innerWidth;
        rainCanvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function startRain() {
        if (rainActive) return;
        rainActive = true;
        drops = [];
        for (let i=0; i<MAX; i++) {
          drops.push({
            x: Math.random() * rainCanvas.width,
            y: Math.random() * rainCanvas.height,
            len: Math.random()*20+10,
            speed: Math.random()*12+8,
            opacity: Math.random()*0.5+0.2
          });
        }
        animateRain();
      }

      function stopRain() {
        rainActive = false;
        ctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);
      }

      function animateRain() {
        if (!rainActive) return;
        ctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);
        ctx.beginPath();
        for (let d of drops) {
          ctx.moveTo(d.x, d.y);
          ctx.lineTo(d.x-1, d.y+d.len);
          ctx.strokeStyle = `rgba(174,194,224,${d.opacity})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
          d.y += d.speed;
          if (d.y > rainCanvas.height) {
            d.y = -10;
            d.x = Math.random()*rainCanvas.width;
          }
        }
        requestAnimationFrame(animateRain);
      }

      function updateRain(weatherCode) {
        const info = getWeather(weatherCode);
        info.isRain ? startRain() : stopRain();
      }

      // ---------- 获取天气数据 ----------
      async function fetchWeather() {
        try {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`+
            `&hourly=temperature_2m,precipitation_probability,weathercode,relativehumidity_2m,windspeed_10m,visibility`+
            `&daily=temperature_2m_max,temperature_2m_min,weathercode`+
            `&timezone=Asia/Shanghai&forecast_days=7`;
          const res = await fetch(url);
          if (!res.ok) throw new Error('网络错误');
          return await res.json();
        } catch(e) {
          console.error(e);
          return null;
        }
      }

      function updateUI(data) {
        if (!data) {
          alert('天气数据获取失败，请刷新重试');
          return;
        }
        const hourly = data.hourly;
        const daily = data.daily;

        const nowTemp = hourly.temperature_2m[0];
        const nowCode = hourly.weathercode[0];
        const nowHum = hourly.relativehumidity_2m[0];
        const nowWind = hourly.windspeed_10m[0];
        const nowVis = (hourly.visibility[0] / 1000).toFixed(1) || 'N/A';
        const todayMax = daily.temperature_2m_max[0];
        const todayMin = daily.temperature_2m_min[0];

        const info = getWeather(nowCode);

        // 更新当前天气显示
        tempMain.textContent = `${Math.round(nowTemp)}°`;
        weatherDesc.textContent = info.emoji + ' ' + info.desc;
        hiLo.textContent = `最高 ${Math.round(todayMax)}° / 最低 ${Math.round(todayMin)}°`;
        humVal.textContent = `${nowHum}%`;
        windVal.textContent = `${nowWind} km/h`;
        feelVal.textContent = `${Math.round(nowTemp)}°`;  // Open-Meteo免费版无体感，用温度近似
        visVal.textContent = `${nowVis} km`;

        // 背景与动效
        bodyBg.className = info.bg;
        updateRain(nowCode);

        // 生活建议
        adviceText.textContent = getAdvice(nowCode);

        // 逐小时
        hourlyContainer.innerHTML = '';
        const maxH = Math.min(hourly.time.length, 24);
        for (let i=0; i<maxH; i++) {
          const t = hourly.time[i];
          const temp = hourly.temperature_2m[i];
          const code = hourly.weathercode[i];
          const prob = hourly.precipitation_probability[i];
          const hInfo = getWeather(code);
          const date = new Date(t);
          const hour = date.getHours();
          const div = document.createElement('div');
          div.className = 'hour-item';
          div.innerHTML = `<div class="hour-time">${hour}:00</div>
            <div class="hour-icon">${hInfo.emoji}</div>
            <div class="hour-temp">${Math.round(temp)}°</div>
            <div class="hour-rain">💧${prob}%</div>`;
          hourlyContainer.appendChild(div);
        }

        // 7日图表
        const labels = daily.time.map(t => {
          const d = new Date(t);
          return `${d.getMonth()+1}/${d.getDate()}`;
        });
        const maxT = daily.temperature_2m_max;
        const minT = daily.temperature_2m_min;
        if (tempChart) tempChart.destroy();
        const ctx = document.getElementById('tempChart').getContext('2d');
        tempChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              { label: '最高', data: maxT, borderColor: '#ff9f7c', backgroundColor: 'rgba(255,159,124,0.1)', tension: 0.3, pointRadius: 3 },
              { label: '最低', data: minT, borderColor: '#7cc0ff', backgroundColor: 'rgba(124,192,255,0.1)', tension: 0.3, pointRadius: 3 }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#ddd' } } },
            scales: {
              x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
              y: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } }
            }
          }
        });

        // 更新地图弹窗
        if (map && mapMarker) {
          mapMarker.setPopupContent(`<b>秦皇岛</b><br>${info.emoji} ${info.desc} ${Math.round(nowTemp)}°C<br>💧${nowHum}% 🌬️${nowWind}km/h`);
        }
      }

      // 初始化地图
      function initMap() {
        if (map) return;
        map = L.map('map', { center: [LAT, LON], zoom: 10, attributionControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
        mapMarker = L.marker([LAT, LON]).addTo(map).bindPopup('加载中...');
      }

      async function loadAll() {
        const data = await fetchWeather();
        updateUI(data);
        if (!map) initMap();
      }

      // 页面加载
      window.addEventListener('load', () => {
        loadAll();
        setInterval(loadAll, 15 * 60 * 1000);
      });

      // 导航点击
      document.getElementById('navNow').addEventListener('click', ()=> document.getElementById('currentCard').scrollIntoView({behavior:'smooth'}));
      document.getElementById('navHourly').addEventListener('click', ()=> document.getElementById('hourlySection').scrollIntoView({behavior:'smooth'}));
      document.getElementById('navDaily').addEventListener('click', ()=> document.getElementById('dailySection').scrollIntoView({behavior:'smooth'}));
      document.getElementById('navMapBtn').addEventListener('click', ()=> {
        document.getElementById('mapSection').scrollIntoView({behavior:'smooth'});
        setTimeout(()=>{ if(map) map.invalidateSize(); }, 300);
      });
      document.getElementById('refreshBtn').addEventListener('click', (e)=>{
        e.preventDefault();
        loadAll();
      });
      document.getElementById('aboutBtn').addEventListener('click', (e)=>{
        e.preventDefault();
        alert('🌦 秦皇岛实时天气\n数据：Open-Meteo (免费)\n地图：OpenStreetMap\n界面灵感来自 Apple 天气');
      });

      // 二级菜单交互
      const dropdownBtn = document.getElementById('dropdownBtn');
      const dropdownContent = document.getElementById('dropdownContent');
      dropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownContent.classList.toggle('show');
      });
      document.addEventListener('click', (e) => {
        if (!dropdownBtn.contains(e.target) && !dropdownContent.contains(e.target)) {
          dropdownContent.classList.remove('show');
        }
      });

      // 地图尺寸修正
      window.addEventListener('resize', ()=>{
        if(map) setTimeout(()=>map.invalidateSize(), 100);
      });
    })();
  </script>
</body>
</html>
