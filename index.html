<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>秦皇岛 · 精致天气</title>

    <!-- Chart.js (用于折线图) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>

    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b0e1a;
            color: #f0f4ff;
            padding: 0 0 40px 0;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景光效 */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(70, 130, 255, 0.10) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: aurora 18s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 180, 60, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: aurora2 22s ease-in-out infinite alternate;
        }
        @keyframes aurora {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }
        @keyframes aurora2 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-50px, -30px) scale(1.3); }
        }

        /* ===== 雨滴画布 ===== */
        #rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        #rain-canvas.active {
            opacity: 1;
        }

        /* ===== 主容器 ===== */
        .app-wrapper {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px 16px 0;
        }

        /* ===== 毛玻璃导航栏 ===== */
        .glass-nav {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            flex-wrap: wrap;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-left .city-select {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 20px;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .nav-left .city-select option {
            background: #1a2332;
            color: #fff;
        }
        .nav-center {
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.5px;
        }
        .nav-right {
            position: relative;
        }
        .nav-right .more-btn {
            background: rgba(255,255,255,0.03);
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-right .more-btn:hover {
            background: rgba(255,255,255,0.08);
        }
        .nav-right .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 110%;
            min-width: 140px;
            background: rgba(22, 30, 46, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 18px;
            padding: 6px 0;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .nav-right .dropdown-menu.show {
            display: block;
        }
        .nav-right .dropdown-menu a {
            display: block;
            padding: 8px 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.15s ease;
            border-left: 2px solid transparent;
            cursor: pointer;
        }
        .nav-right .dropdown-menu a:hover {
            background: rgba(255,255,255,0.04);
            color: #fff;
            border-left-color: #4688ff;
            padding-left: 26px;
        }

        /* ===== 卡片通用 ===== */
        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 12px 48px rgba(0,0,0,0.25);
            padding: 22px 20px;
            margin-bottom: 18px;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }
        .card-title {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .badge {
            font-size: 10px;
            background: rgba(255,255,255,0.06);
            padding: 2px 12px;
            border-radius: 30px;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        /* ===== 当前天气概览 ===== */
        .weather-main {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 28px 24px;
        }
        .weather-main .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .weather-main .temp-now {
            font-size: 72px;
            font-weight: 300;
            letter-spacing: -4px;
            line-height: 1;
            background: linear-gradient(135deg, #fff 50%, #8ab4f8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .weather-main .temp-now sup {
            font-size: 30px;
            font-weight: 300;
            -webkit-text-fill-color: rgba(255,255,255,0.3);
        }
        .weather-main .weather-icon {
            font-size: 64px;
            line-height: 1;
            filter: drop-shadow(0 4px 12px rgba(70,130,255,0.2));
        }
        .weather-main .desc-range {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-top: 2px;
        }
        .weather-main .weather-desc {
            font-size: 22px;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
        }
        .weather-main .temp-range {
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.05);
            padding: 2px 16px;
            border-radius: 30px;
        }

        /* ===== 详情网格卡片 ===== */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 8px;
        }
        .detail-card {
            background: rgba(255,255,255,0.02);
            border-radius: 18px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            position: relative;
        }
        .detail-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.06);
        }
        .detail-card .label {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .detail-card .value {
            font-size: 18px;
            font-weight: 500;
            margin-top: 4px;
            color: #fff;
        }
        .detail-card .value .unit {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255,255,255,0.3);
            margin-left: 2px;
        }
        .detail-card .sub {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-top: 2px;
        }
        .detail-card .expand-indicator {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-top: 4px;
        }

        /* 二级展开面板 */
        .detail-panel {
            display: none;
            margin-top: 10px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.04);
            grid-column: 1 / -1;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }
        .detail-panel.open {
            display: block;
        }
        .detail-panel .panel-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .detail-panel .panel-row:last-child {
            border-bottom: none;
        }

        /* 响应式调整详情网格 */
        @media (max-width: 640px) {
            .detail-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }
        @media (max-width: 420px) {
            .detail-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ===== 逐小时横向滚动 ===== */
        .hourly-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 2px 12px 2px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.08) transparent;
            -webkit-overflow-scrolling: touch;
        }
        .hourly-scroll::-webkit-scrollbar {
            height: 3px;
        }
        .hourly-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.12);
            border-radius: 10px;
        }
        .hourly-item {
            flex: 0 0 68px;
            text-align: center;
            padding: 10px 4px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s ease;
        }
        .hourly-item:hover {
            background: rgba(255,255,255,0.06);
        }
        .hourly-item .h-time {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        .hourly-item .h-icon {
            font-size: 28px;
            margin: 4px 0;
        }
        .hourly-item .h-temp {
            font-size: 17px;
            font-weight: 500;
        }
        .hourly-item .h-pop {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
        }

        /* ===== 15天列表预报 ===== */
        .forecast-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .forecast-row {
            display: grid;
            grid-template-columns: 80px 1fr 60px 50px;
            align-items: center;
            padding: 6px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.01);
            transition: background 0.2s ease;
            gap: 8px;
        }
        .forecast-row:hover {
            background: rgba(255,255,255,0.03);
        }
        .forecast-row .f-day {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
        }
        .forecast-row .f-icon {
            font-size: 22px;
            text-align: center;
        }
        .forecast-row .f-temps {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            font-size: 15px;
        }
        .forecast-row .f-temps .high {
            color: #ff8a7a;
        }
        .forecast-row .f-temps .low {
            color: #7ab8ff;
        }
        .forecast-row .f-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            text-align: right;
        }

        /* ===== 空气质量卡片 ===== */
        .aqi-display {
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
        }
        .aqi-big {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: -2px;
            min-width: 80px;
            line-height: 1.1;
        }
        .aqi-big .aqi-label {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255,255,255,0.3);
            display: block;
            margin-top: 2px;
        }
        .aqi-details {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 28px;
            flex: 1;
        }
        .aqi-details .aqi-item {
            font-size: 14px;
        }
        .aqi-details .aqi-item .label {
            color: rgba(255,255,255,0.25);
        }
        .aqi-details .aqi-item .val {
            font-weight: 500;
            margin-left: 4px;
        }
        .aqi-good {
            color: #4caf50;
        }
        .aqi-moderate {
            color: #ffeb3b;
        }
        .aqi-unhealthy-sensitive {
            color: #ff9800;
        }
        .aqi-unhealthy {
            color: #f44336;
        }
        .aqi-very-unhealthy {
            color: #9c27b0;
        }
        .aqi-hazardous {
            color: #7c4d4d;
        }

        /* 响应式微调 */
        @media (max-width: 640px) {
            .weather-main .temp-now {
                font-size: 58px;
            }
            .weather-main .weather-icon {
                font-size: 50px;
            }
            .weather-main .weather-desc {
                font-size: 18px;
            }
            .forecast-row {
                grid-template-columns: 60px 1fr 50px 40px;
                font-size: 13px;
                padding: 6px 10px;
            }
            .forecast-row .f-day {
                font-size: 13px;
            }
            .forecast-row .f-icon {
                font-size: 20px;
            }
            .forecast-row .f-temps {
                font-size: 14px;
            }
            .card {
                padding: 18px 14px;
                border-radius: 22px;
            }
            .weather-main {
                padding: 20px 16px;
            }
            .hourly-item {
                flex: 0 0 60px;
            }
            .hourly-item .h-icon {
                font-size: 22px;
            }
            .hourly-item .h-temp {
                font-size: 15px;
            }
            .aqi-big {
                font-size: 46px;
            }
            .aqi-details {
                gap: 8px 16px;
            }
            .aqi-details .aqi-item {
                font-size: 12px;
            }
        }
        @media (max-width: 420px) {
            .weather-main .temp-now {
                font-size: 48px;
            }
            .weather-main .weather-icon {
                font-size: 42px;
            }
            .aqi-display {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .aqi-big {
                font-size: 40px;
            }
            .glass-nav {
                flex-wrap: wrap;
                gap: 8px;
            }
            .nav-center {
                order: 3;
                width: 100%;
                text-align: center;
                font-size: 12px;
                color: rgba(255,255,255,0.2);
            }
        }

        /* 工具类 */
        .hidden {
            display: none !important;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- ===== 雨滴画布 ===== -->
    <canvas id="rain-canvas"></canvas>

    <div class="app-wrapper">

        <!-- ===== 毛玻璃导航栏 ===== -->
        <nav class="glass-nav">
            <div class="nav-left">
                <select class="city-select" id="citySelect">
                    <option value="39.93,119.59">秦皇岛</option>
                    <option value="39.90,116.40">北京</option>
                    <option value="31.23,121.47">上海</option>
                    <option value="23.13,113.26">广州</option>
                    <option value="22.54,114.06">深圳</option>
                    <option value="30.57,104.06">成都</option>
                </select>
            </div>
            <div class="nav-center" id="updateTime">更新中...</div>
            <div class="nav-right">
                <button class="more-btn" id="moreBtn">⋯</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a data-target="section-air">🌬 空气质量</a>
                    <a data-target="section-hourly">⏱ 逐小时</a>
                    <a data-target="section-forecast">📅 15天预报</a>
                    <a data-target="section-details">📊 详情</a>
                </div>
            </div>
        </nav>

        <!-- ===== 当前天气概览 ===== -->
        <section id="section-current" class="card weather-main">
            <div class="top-row">
                <span class="temp-now" id="currentTemp">--<sup>°</sup></span>
                <span class="weather-icon" id="weatherIcon">🌤</span>
            </div>
            <div class="desc-range">
                <span class="weather-desc" id="weatherDesc">加载中...</span>
                <span class="temp-range" id="tempRange">-- / --</span>
            </div>
        </section>

        <!-- ===== 空气质量（单独卡片，用于快捷跳转） ===== -->
        <section id="section-air" class="card">
            <div class="card-title">🌬 空气质量 <span class="badge" id="aqiLevel">--</span></div>
            <div class="aqi-display">
                <div class="aqi-big" id="aqiBig">--<span class="aqi-label">AQI</span></div>
                <div class="aqi-details" id="aqiDetails">
                    <div class="aqi-item"><span class="label">PM2.5</span> <span class="val" id="pm25">--</span></div>
                    <div class="aqi-item"><span class="label">PM10</span> <span class="val" id="pm10">--</span></div>
                    <div class="aqi-item"><span class="label">O₃</span> <span class="val" id="o3">--</span></div>
                    <div class="aqi-item"><span class="label">NO₂</span> <span class="val" id="no2">--</span></div>
                    <div class="aqi-item"><span class="label">SO₂</span> <span class="val" id="so2">--</span></div>
                    <div class="aqi-item"><span class="label">CO</span> <span class="val" id="co">--</span></div>
                </div>
            </div>
        </section>

        <!-- ===== 逐小时预报 ===== -->
        <section id="section-hourly" class="card">
            <div class="card-title">⏱ 逐小时预报 <span class="badge">未来24h</span></div>
            <div class="hourly-scroll" id="hourlyContainer"></div>
        </section>

        <!-- ===== 15天列表预报 ===== -->
        <section id="section-forecast" class="card">
            <div class="card-title">📅 15天天气预报</div>
            <div class="forecast-list" id="forecastContainer"></div>
        </section>

        <!-- ===== 详情网格卡片 ===== -->
        <section id="section-details" class="card">
            <div class="card-title">📊 天气详情 <span class="badge">点击卡片展开</span></div>
            <div class="detail-grid" id="detailGrid">
                <!-- 温度 -->
                <div class="detail-card" data-panel="temp">
                    <div class="label">温度</div>
                    <div class="value" id="dTemp">--<span class="unit">°</span></div>
                    <div class="sub" id="dFeelsLike">体感 --°</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 降水 -->
                <div class="detail-card" data-panel="precip">
                    <div class="label">降水</div>
                    <div class="value" id="dPrecip">--<span class="unit">mm</span></div>
                    <div class="sub" id="dPrecipProb">概率 --%</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 空气质量 -->
                <div class="detail-card" data-panel="air">
                    <div class="label">空气质量</div>
                    <div class="value" id="dAqi">--</div>
                    <div class="sub" id="dAqiLevel">--</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 紫外线 -->
                <div class="detail-card" data-panel="uv">
                    <div class="label">紫外线</div>
                    <div class="value" id="dUv">--</div>
                    <div class="sub" id="dUvLevel">--</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 风 -->
                <div class="detail-card" data-panel="wind">
                    <div class="label">风</div>
                    <div class="value" id="dWind">--<span class="unit">km/h</span></div>
                    <div class="sub" id="dWindDir">--</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 湿度 -->
                <div class="detail-card" data-panel="humidity">
                    <div class="label">湿度</div>
                    <div class="value" id="dHumidity">--<span class="unit">%</span></div>
                    <div class="sub" id="dDewPoint">露点 --°</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 能见度 -->
                <div class="detail-card" data-panel="visibility">
                    <div class="label">能见度</div>
                    <div class="value" id="dVisibility">--<span class="unit">km</span></div>
                    <div class="sub" id="dVisibilityDesc">--</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 气压 -->
                <div class="detail-card" data-panel="pressure">
                    <div class="label">气压</div>
                    <div class="value" id="dPressure">--<span class="unit">hPa</span></div>
                    <div class="sub" id="dPressureTrend">--</div>
                    <div class="expand-indicator">▼</div>
                </div>
                <!-- 日出日落 -->
                <div class="detail-card" data-panel="sun">
                    <div class="label">日出 / 日落</div>
                    <div class="value" id="dSunrise" style="font-size:15px;">--</div>
                    <div class="sub" id="dSunset" style="font-size:15px;">--</div>
                    <div class="expand-indicator">▼</div>
                </div>
            </div>
            <!-- 面板容器（动态插入） -->
            <div id="panelContainer"></div>
        </section>

        // ============================================================
        //  雨滴动效
        // ============================================================
        class RainEffect {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.drops = [];
                this.running = false;
                this.animId = null;
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            start() {
                if (this.running) return;
                this.running = true;
                this.drops = [];
                const count = Math.floor((window.innerWidth * window.innerHeight) / 8000);
                for (let i = 0; i < Math.min(count, 120); i++) {
                    this.drops.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height - this.canvas.height,
                        len: 8 + Math.random() * 14,
                        speed: 8 + Math.random() * 14,
                        width: 1 + Math.random() * 1.5,
                        opacity: 0.3 + Math.random() * 0.4
                    });
                }
                this.canvas.classList.add('active');
                this.animate();
            }
            stop() {
                this.running = false;
                if (this.animId) cancelAnimationFrame(this.animId);
                this.canvas.classList.remove('active');
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
            animate() {
                if (!this.running) return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (const d of this.drops) {
                    d.y += d.speed;
                    if (d.y > this.canvas.height) {
                        d.y = -d.len - Math.random() * 20;
                        d.x = Math.random() * this.canvas.width;
                    }
                    this.ctx.beginPath();
                    this.ctx.moveTo(d.x, d.y);
                    this.ctx.lineTo(d.x - d.len * 0.2, d.y + d.len);
                    this.ctx.strokeStyle = `rgba(180, 210, 255, ${d.opacity * 0.5})`;
                    this.ctx.lineWidth = d.width;
                    this.ctx.stroke();
                }
                this.animId = requestAnimationFrame(() => this.animate());
            }
        }

        // ============================================================

        async function fetchOpenMeteo(lat, lon) {
            const url =
                `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,uv_index,pressure_msl,visibility&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation_probability,weather_code,wind_speed_10m,uv_index,visibility&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,precipitation_sum&timezone=${TIMEZONE}&forecast_days=15`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Open-Meteo 请求失败');
            return await resp.json();
        }

        async function fetchWAQI(lat, lon) {
            if (!WAQI_TOKEN || WAQI_TOKEN === 'YOUR_WAQI_TOKEN_HERE') return null;
            const url = `https://api.waqi.info/feed/geo:${lat};${lon}/?token=${WAQI_TOKEN}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('WAQI 请求失败');
            const data = await resp.json();
            if (data.status !== 'ok') throw new Error('WAQI 返回错误');
            return data.data;
        }

        // 主渲染

            try {
                const weather = await fetchOpenMeteo(lat, lon);
                currentWeather = weather.current;
                currentDaily = weather.daily;
                currentHourly = weather.hourly;

                // 空气质量
                try {
                    aqiData = await fetchWAQI(lat, lon);
                } catch (e) {
                    aqiData = null;
                }

                const w = weather.current;
                const d = weather.daily;
                const h = weather.hourly;

                // ---- 当前概览 ----
                document.getElementById('currentTemp').innerHTML = Math.round(w.temperature_2m) + '<sup>°</sup>';
                document.getElementById('weatherIcon').textContent = getWeatherEmoji(w.weather_code);
                document.getElementById('weatherDesc').textContent = getWeatherDesc(w.weather_code);

                    const low = Math.round(d.temperature_2m_min[0]);
                    document.getElementById('tempRange').textContent = high + '° / ' + low + '°';
                }

                // ---- 雨滴 ----
                const rainCodes = [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82];
                if (rainCodes.includes(w.weather_code)) rain.start();
                else rain.stop();

                // ---- 空气质量 ----

                    const aqi = aqiData.aqi || 0;
                    const level = getAQILevel(aqi);

                    document.getElementById('aqiLevel').textContent = level.label;
                    document.getElementById('aqiLevel').className = 'badge ' + level.cls;
                    document.getElementById('aqiBig').className = 'aqi-big ' + level.cls;
                    const iaqi = aqiData.iaqi || {};
                    document.getElementById('pm25').textContent = (iaqi.pm25 ? iaqi.pm25.v : '--') + ' µg';
                    document.getElementById('pm10').textContent = (iaqi.pm10 ? iaqi.pm10.v : '--') + ' µg';
                    document.getElementById('o3').textContent = (iaqi.o3 ? iaqi.o3.v : '--') + ' µg';
                    document.getElementById('no2').textContent = (iaqi.no2 ? iaqi.no2.v : '--') + ' µg';
                    document.getElementById('so2').textContent = (iaqi.so2 ? iaqi.so2.v : '--') + ' µg';

                // ---- 逐小时 ----
                const hourlyContainer = document.getElementById('hourlyContainer');

                        const dt = new Date(h.time[i]);
                        if (dt.getHours() === currentHour && dt.getDate() === now.getDate()) {
                            startIdx = i;
                            break;

                    }
                    for (let i = startIdx; i < Math.min(startIdx + 24, h.time.length); i++) {

            } catch (err) {

            }
        }

                const target = document.querySelector(this.dataset.target);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                dropdown.classList.remove('show');
            });
        });

        // ============================================================
        //  启动
        // ============================================================
        async function init() {
            await renderAll(LAT, LON);
            setInterval(async () => {
                await renderAll(LAT, LON);
            }, 600000); // 每10分钟刷新
        }
        init().catch(console.error);
        console.log('🌤 秦皇岛天气 · 仿苹果/墨迹风格 · WAQI Token已配置');
    </script>
</body>
