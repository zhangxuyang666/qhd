<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>秦皇岛实时天气 · 七日天气</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --glass-bg: rgba(255,255,255,0.15);
      --glass-border: rgba(255,255,255,0.25);
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 20px 0;
      margin: 0;
      overflow-x: hidden;
      color: #f1f5f9;
      position: relative;
    }
    #rainCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      pointer-events: none; z-index:0; opacity:0.7;
    }
    .main-container {
      position: relative; z-index:2; width:100%; max-width:700px;
      padding:16px; display:flex; flex-direction:column; gap:20px; margin-top:10px;
    }
    .navbar {
      display:flex; justify-content:space-between; align-items:center;
      background: var(--glass-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid var(--glass-border); border-radius:40px; padding:10px 20px;
      box-shadow:0 8px 32px rgba(0,0,0,0.1); flex-wrap:wrap;
    }
    .logo { font-weight:600; font-size:1.2rem; color:white; display:flex; align-items:center; gap:6px; }
    .nav-links { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .nav-item {
      background:transparent; border:none; color:#e2e8f0; padding:8px 14px; border-radius:30px;
      font-size:0.9rem; cursor:pointer; font-weight:500; white-space:nowrap;
      background:rgba(255,255,255,0.05); backdrop-filter:blur(5px);
    }
    .nav-item:hover { background:rgba(255,255,255,0.2); color:white; }
    .dropdown { position:relative; display:inline-block; }
    .dropdown-content {
      display:none; position:absolute; right:0; top:110%;
      background:rgba(15,23,42,0.9); backdrop-filter:blur(25px); border-radius:20px;
      min-width:140px; box-shadow:0 15px 30px rgba(0,0,0,0.5); z-index:100;
      border:1px solid rgba(255,255,255,0.2);
    }
    .dropdown-content.show { display:block; }
    .dropdown-content a {
      color:#cbd5e1; padding:12px 20px; display:block; text-decoration:none;
      font-size:0.9rem; transition:background 0.2s;
    }
    .dropdown-content a:hover { background:rgba(255,255,255,0.15); color:white; }
    .glass-card {
      background: var(--glass-bg); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--glass-border); border-radius:32px; padding:22px 20px;
      box-shadow:0 8px 32px rgba(0,0,0,0.1); color:#f8fafc;
    }
    .current-weather { text-align:center; }
    .weather-icon-large { font-size:5rem; filter:drop-shadow(0 8px 12px rgba(0,0,0,0.3)); margin:10px 0; }
    .temperature-display {
      font-size:4.5rem; font-weight:300; line-height:1; margin:10px 0 4px;
      background:linear-gradient(to right, #ffffff, #e2e8f0); -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .description { font-size:1.3rem; text-transform:capitalize; color:#cbd5e1; margin-bottom:15px; }
    .detail-row { display:flex; justify-content:center; gap:25px; flex-wrap:wrap; margin-top:10px; }
    .detail-item {
      display:flex; flex-direction:column; align-items:center;
      background:rgba(255,255,255,0.08); border-radius:20px; padding:10px 18px;
    }
    .detail-label { font-size:0.8rem; color:#94a3b8; }
    .detail-value { font-weight:600; font-size:1.1rem; }
    .hourly-scroll, .daily-scroll {
      display:flex; overflow-x:auto; gap:14px; padding:10px 6px 15px;
      scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.3) transparent;
    }
    .hour-item, .daily-item {
      flex:0 0 auto; min-width:85px;
      background:rgba(255,255,255,0.08); border-radius:24px; padding:12px 8px;
      display:flex; flex-direction:column; align-items:center; gap:6px;
      font-size:0.85rem; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1);
    }
    .daily-item { min-width:100px; }
    .hour-time, .daily-date { color:#cbd5e1; font-weight:500; }
    .hour-icon, .daily-icon { font-size:1.6rem; }
    .hour-temp, .daily-temp { font-weight:600; }
    .daily-desc { font-size:0.75rem; color:#94a3b8; text-transform:capitalize; }
    .daily-rain { font-size:0.7rem; color:#60a5fa; }
    #map { height:240px; border-radius:24px; overflow:hidden; z-index:1; border:1px solid rgba(255,255,255,0.2); }
    .chart-container { position:relative; height:180px; width:100%; margin-top:5px; }
    @media (max-width:480px) {
      .navbar { padding:8px 14px; }
      .logo { font-size:1rem; }
      .nav-item { padding:6px 10px; font-size:0.8rem; }
      .temperature-display { font-size:3.8rem; }
    }
  </style>
</head>
<body>
  <canvas id="rainCanvas"></canvas>
  <div class="main-container">
    <nav class="navbar">
      <div class="logo">🌊 秦皇岛 · 天气</div>
      <div class="nav-links">
        <button class="nav-item" id="navNow">实时</button>
        <button class="nav-item" id="navHourly">逐小时</button>
        <button class="nav-item" id="navDaily">7日预报</button>
        <button class="nav-item" id="navMap">地图</button>
        <div class="dropdown">
          <button class="nav-item" id="dropdownBtn">更多 ▾</button>
          <div class="dropdown-content" id="dropdownContent">
            <a href="#" id="refreshBtn">🔄 刷新数据</a>
            <a href="#" id="aboutBtn">ℹ️ 关于</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="glass-card current-weather" id="currentCard">
      <div class="weather-icon-large" id="weatherEmoji">☀️</div>
      <div class="temperature-display" id="tempDisplay">--°</div>
      <div class="description" id="weatherDesc">晴朗</div>
      <div class="detail-row">
        <div class="detail-item"><span class="detail-label">💧 湿度</span><span class="detail-value" id="humidityVal">--%</span></div>
        <div class="detail-item"><span class="detail-label">🌬️ 风速</span><span class="detail-value" id="windVal">-- km/h</span></div>
        <div class="detail-item"><span class="detail-label">🌡️ 体感</span><span class="detail-value" id="feelsVal">--°</span></div>
      </div>
    </div>

    <div class="glass-card" id="hourlySection">
      <h3 style="margin-bottom:12px; font-weight:500;">⏳ 逐小时预报</h3>
      <div class="hourly-scroll" id="hourlyContainer"></div>
    </div>

    <!-- 七日天气卡片（主展示） -->
    <div class="glass-card" id="dailySection">
      <h3 style="margin-bottom:12px; font-weight:500;">📅 七日天气</h3>
      <div class="daily-scroll" id="dailyContainer"></div>
      <!-- 保留温度趋势折线图作为辅助 -->
      <div class="chart-container" style="margin-top:20px;">
        <canvas id="tempChart"></canvas>
      </div>
    </div>

    <div class="glass-card" id="mapSection">
      <h3 style="margin-bottom:12px; font-weight:500;">🗺️ 天气地图</h3>
      <div id="map"></div>
      <p style="font-size:0.7rem; color:#94a3b8; margin-top:6px;">点击标记查看当前天气</p>
    </div>
  </div>

  <script>
    (function() {
      const LAT = 39.9389, LON = 119.5983, CITY_NAME = "秦皇岛";
      const weatherEmoji = document.getElementById('weatherEmoji');
      const tempDisplay = document.getElementById('tempDisplay');
      const weatherDesc = document.getElementById('weatherDesc');
      const humidityVal = document.getElementById('humidityVal');
      const windVal = document.getElementById('windVal');
      const feelsVal = document.getElementById('feelsVal');
      const hourlyContainer = document.getElementById('hourlyContainer');
      const dailyContainer = document.getElementById('dailyContainer');
      const rainCanvas = document.getElementById('rainCanvas');
      const ctx = rainCanvas.getContext('2d');
      let tempChart = null, map = null, mapMarker = null;

      const weatherCodeMap = {
        0:{desc:'晴天',emoji:'☀️',isRain:false}, 1:{desc:'大部晴朗',emoji:'🌤️',isRain:false},
        2:{desc:'局部多云',emoji:'⛅',isRain:false}, 3:{desc:'多云',emoji:'☁️',isRain:false},
        45:{desc:'雾',emoji:'🌫️',isRain:false}, 48:{desc:'霜雾',emoji:'🌫️',isRain:false},
        51:{desc:'小毛毛雨',emoji:'🌦️',isRain:true}, 53:{desc:'毛毛雨',emoji:'🌦️',isRain:true},
        55:{desc:'大毛毛雨',emoji:'🌧️',isRain:true}, 61:{desc:'小雨',emoji:'🌧️',isRain:true},
        63:{desc:'中雨',emoji:'🌧️',isRain:true}, 65:{desc:'大雨',emoji:'🌧️',isRain:true},
        66:{desc:'小冻雨',emoji:'🌨️',isRain:true}, 67:{desc:'冻雨',emoji:'🌨️',isRain:true},
        71:{desc:'小雪',emoji:'❄️',isRain:false}, 73:{desc:'中雪',emoji:'❄️',isRain:false},
        75:{desc:'大雪',emoji:'❄️',isRain:false}, 77:{desc:'雪粒',emoji:'❄️',isRain:false},
        80:{desc:'小阵雨',emoji:'🌦️',isRain:true}, 81:{desc:'阵雨',emoji:'🌧️',isRain:true},
        82:{desc:'大阵雨',emoji:'🌧️',isRain:true}, 85:{desc:'小阵雪',emoji:'❄️',isRain:false},
        86:{desc:'阵雪',emoji:'❄️',isRain:false}, 95:{desc:'雷暴',emoji:'⛈️',isRain:true},
        96:{desc:'雷暴伴冰雹',emoji:'⛈️',isRain:true}, 99:{desc:'强雷暴伴冰雹',emoji:'⛈️',isRain:true}
      };
      function getWeatherInfo(code) { return weatherCodeMap[code] || {desc:'未知',emoji:'🌈',isRain:false}; }

      // 雨滴动画
      let rainActive = false, raindrops = [], MAX_DROPS = 120;
      function resizeCanvas() { rainCanvas.width = window.innerWidth; rainCanvas.height = window.innerHeight; }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      function startRain() {
        if(rainActive) return;
        rainActive = true; raindrops = [];
        for(let i=0; i<MAX_DROPS; i++) raindrops.push({x:Math.random()*rainCanvas.width, y:Math.random()*rainCanvas.height, length:Math.random()*20+10, speed:Math.random()*12+8, opacity:Math.random()*0.4+0.2});
        animateRain();
      }
      function stopRain() { rainActive = false; ctx.clearRect(0,0,rainCanvas.width,rainCanvas.height); }
      function animateRain() {
        if(!rainActive) return;
        ctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);
        ctx.beginPath();
        for(let d of raindrops) {
          ctx.moveTo(d.x, d.y); ctx.lineTo(d.x-1, d.y+d.length);
          ctx.strokeStyle = `rgba(174,194,224,${d.opacity})`; ctx.lineWidth = 1.2; ctx.stroke();
          d.y += d.speed;
          if(d.y > rainCanvas.height) { d.y = -10; d.x = Math.random()*rainCanvas.width; }
        }
        requestAnimationFrame(animateRain);
      }
      function updateRainEffect(code) { getWeatherInfo(code).isRain ? startRain() : stopRain(); }

      async function fetchWeatherData() {
        try {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,precipitation_probability,weathercode,relativehumidity_2m,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=Asia/Shanghai&forecast_days=7`;
          const res = await fetch(url);
          if(!res.ok) throw new Error('网络错误');
          return await res.json();
        } catch(e) { console.error(e); return null; }
      }

      function updateUI(data) {
        if(!data) { alert('天气数据获取失败'); return; }
        const hourly = data.hourly;
        const currentTemp = hourly.temperature_2m[0] ?? '--';
        const currentCode = hourly.weathercode[0] ?? 0;
        const currentHum = hourly.relativehumidity_2m[0] ?? '--';
        const currentWind = hourly.windspeed_10m[0] ?? '--';
        const info = getWeatherInfo(currentCode);
        tempDisplay.textContent = `${Math.round(currentTemp)}°`;
        weatherEmoji.textContent = info.emoji;
        weatherDesc.textContent = info.desc;
        humidityVal.textContent = `${currentHum}%`;
        windVal.textContent = `${currentWind} km/h`;
        feelsVal.textContent = `${Math.round(currentTemp)}°`;
        updateRainEffect(currentCode);

        // 逐小时
        hourlyContainer.innerHTML = '';
        const maxH = Math.min(hourly.time.length, 24);
        for(let i=0; i<maxH; i++) {
          const t = hourly.time[i], temp = hourly.temperature_2m[i] ?? '--';
          const code = hourly.weathercode[i] ?? 0, precip = hourly.precipitation_probability[i] ?? 0;
          const info = getWeatherInfo(code);
          const hour = new Date(t).getHours();
          const div = document.createElement('div'); div.className = 'hour-item';
          div.innerHTML = `<span class="hour-time">${hour}:00</span><span class="hour-icon">${info.emoji}</span><span class="hour-temp">${Math.round(temp)}°</span><span class="hour-rain">💧${precip}%</span>`;
          hourlyContainer.appendChild(div);
        }

        // 七日天气卡片（重点修改部分）
        const daily = data.daily;
        dailyContainer.innerHTML = '';
        for(let i=0; i<daily.time.length; i++) {
          const dateStr = daily.time[i];
          const d = new Date(dateStr);
          const dateLabel = `${d.getMonth()+1}/${d.getDate()} 周${['日','一','二','三','四','五','六'][d.getDay()]}`;
          const code = daily.weathercode[i] ?? 0;
          const info = getWeatherInfo(code);
          const maxT = Math.round(daily.temperature_2m_max[i]);
          const minT = Math.round(daily.temperature_2m_min[i]);
          const precipSum = daily.precipitation_sum[i] ?? 0;
          const div = document.createElement('div'); div.className = 'daily-item';
          div.innerHTML = `
            <span class="daily-date">${dateLabel}</span>
            <span class="daily-icon">${info.emoji}</span>
            <span class="daily-desc">${info.desc}</span>
            <span class="daily-temp">${maxT}°/${minT}°</span>
            <span class="daily-rain">💧${precipSum.toFixed(1)}mm</span>
          `;
          dailyContainer.appendChild(div);
        }

        // 温度折线图（辅助）
        const dates = daily.time.map(t => { const d=new Date(t); return `${d.getMonth()+1}/${d.getDate()}`; });
        if(tempChart) tempChart.destroy();
        const chartCtx = document.getElementById('tempChart').getContext('2d');
        tempChart = new Chart(chartCtx, {
          type: 'line',
          data: {
            labels: dates,
            datasets: [
              { label:'最高 °C', data:daily.temperature_2m_max, borderColor:'#f87171', backgroundColor:'rgba(248,113,113,0.1)', tension:0.3, pointRadius:4 },
              { label:'最低 °C', data:daily.temperature_2m_min, borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,0.1)', tension:0.3, pointRadius:4 }
            ]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{ labels:{ color:'#cbd5e1' } } },
            scales:{
              x:{ ticks:{ color:'#94a3b8' }, grid:{ color:'rgba(255,255,255,0.1)' } },
              y:{ ticks:{ color:'#94a3b8' }, grid:{ color:'rgba(255,255,255,0.1)' } }
            }
          }
        });

        if(map && mapMarker) {
          mapMarker.setPopupContent(`<b>${CITY_NAME}</b><br>🌡️ ${Math.round(currentTemp)}°C ${info.emoji} ${info.desc}<br>💧 ${currentHum}% | 🌬️ ${currentWind} km/h`);
        }
      }

      function initMap() {
        if(map) return;
        map = L.map('map', { center:[LAT,LON], zoom:10, attributionControl:false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:18 }).addTo(map);
        mapMarker = L.marker([LAT,LON]).addTo(map).bindPopup('加载中...');
      }

      async function loadAndUpdate() {
        const data = await fetchWeatherData();
        updateUI(data);
        if(!map) initMap();
        if(data && map && mapMarker) {
          const t = data.hourly.temperature_2m[0], code = data.hourly.weathercode[0];
          const hum = data.hourly.relativehumidity_2m[0], wind = data.hourly.windspeed_10m[0];
          mapMarker.setPopupContent(`<b>${CITY_NAME}</b><br>🌡️ ${Math.round(t)}°C ${getWeatherInfo(code).emoji} ${getWeatherInfo(code).desc}<br>💧 ${hum}% | 🌬️ ${wind} km/h`);
        }
      }

      window.addEventListener('load', ()=>{
        loadAndUpdate();
        setInterval(loadAndUpdate, 15*60*1000);
      });

      // 导航交互
      document.getElementById('navNow').onclick = ()=>document.getElementById('currentCard').scrollIntoView({behavior:'smooth'});
      document.getElementById('navHourly').onclick = ()=>document.getElementById('hourlySection').scrollIntoView({behavior:'smooth'});
      document.getElementById('navDaily').onclick = ()=>document.getElementById('dailySection').scrollIntoView({behavior:'smooth'});
      document.getElementById('navMap').onclick = ()=>{
        document.getElementById('mapSection').scrollIntoView({behavior:'smooth'});
        setTimeout(()=>{ if(map) map.invalidateSize(); },300);
      };
      document.getElementById('refreshBtn').onclick = (e)=>{ e.preventDefault(); loadAndUpdate(); };
      document.getElementById('aboutBtn').onclick = (e)=>{ e.preventDefault(); alert('秦皇岛实时天气看板\n数据：Open-Meteo\n地图：OpenStreetMap'); };

      const dropdownBtn = document.getElementById('dropdownBtn');
      const dropdownContent = document.getElementById('dropdownContent');
      dropdownBtn.addEventListener('click', (e)=>{
        e.preventDefault(); e.stopPropagation();
        dropdownContent.classList.toggle('show');
      });
      document.addEventListener('click', (e)=>{
        if(!dropdownBtn.contains(e.target) && !dropdownContent.contains(e.target)) dropdownContent.classList.remove('show');
      });
      window.addEventListener('resize', ()=>{ if(map) setTimeout(()=>map.invalidateSize(),100); });
    })();
  </script>
</body>
</html>
